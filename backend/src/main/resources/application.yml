server:
  port: 8080
  ssl:
    key-store: classpath:keystore.p12
    key-store-password: changeit
    key-store-type: PKCS12
    key-alias: campus-help

spring:
  application:
    name: campus-help
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET:Y2FtcHVzLWhlbHAtc2VjcmV0LWtleS0yMDI2LW1heS1zZWN1cmUtYW5kLWxvbmc=}
  expiration: 86400000
